name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Run ruff check
        run: uv run ruff check src/ bin/

      - name: Run ruff format check
        run: uv run ruff format --check src/ bin/

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: search_db
        ports:
          - 5435:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d search_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_DATABASE_NAME: search_db
      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: 5435
      POSTGRES_USERNAME: postgres
      KAFKA_BROKERS: localhost:9092
      AD_SERVICE_BASE_URL: http://localhost:8002

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest tests/ -v
